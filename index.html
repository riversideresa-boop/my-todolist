<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的清爽待办清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; /* bg-slate-300 */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; /* bg-slate-400 */
        }

        /* 任务项动画 */
        .task-item {
            transition: all 0.3s ease;
        }
        .task-item.removing {
            opacity: 0;
            transform: translateX(20px);
        }
        
        /* 复选框样式自定义 */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid #cbd5e1; /* border-slate-300 */
            border-radius: 0.375rem; /* rounded-md */
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        
        .custom-checkbox::before {
            content: "";
            width: 0.85em;
            height: 0.85em;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transform-origin: bottom left;
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
        }
        
        .custom-checkbox:checked {
            background-color: #3b82f6; /* bg-blue-500 */
            border-color: #3b82f6;
        }
        
        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        .completed-text {
            color: #9ca3af; /* text-gray-400 */
            text-decoration: line-through;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col h-[80vh] max-h-[800px]">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white shrink-0">
            <h1 class="text-3xl font-bold mb-2">待办事项</h1>
            <p class="text-blue-200 text-sm" id="date-display">正在获取日期...</p>
        </div>

        <!-- Input Area -->
        <div class="p-6 pb-2 shrink-0 border-b border-gray-100">
            <form id="todo-form" class="relative flex items-center">
                <input 
                    type="text" 
                    id="todo-input" 
                    class="w-full pl-4 pr-12 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-700 placeholder-gray-400" 
                    placeholder="添加新任务..."
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="absolute right-2 top-1/2 transform -translate-y-1/2 text-blue-600 hover:text-blue-800 p-2 rounded-full hover:bg-blue-50 transition-colors focus:outline-none"
                    title="添加任务"
                >
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </form>
        </div>

        <!-- Task List Area -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6" id="task-list-container">
            
            <!-- Empty State (Hidden by default) -->
            <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-gray-400 space-y-4">
                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-clipboard-check text-4xl text-gray-300"></i>
                </div>
                <p class="text-lg">一切井井有条</p>
                <p class="text-sm">没有待办事项啦！</p>
            </div>

            <!-- The List -->
            <ul id="todo-list" class="space-y-3">
                <!-- Tasks will be injected here by JavaScript -->
            </ul>
        </div>

        <!-- Footer / Stats -->
        <div class="bg-gray-50 p-4 shrink-0 flex justify-between items-center text-sm text-gray-500 border-t border-gray-200">
            <span id="task-count">0 个任务</span>
            <button id="clear-completed" class="hover:text-blue-600 transition-colors focus:outline-none">
                清除已完成
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const form = document.getElementById('todo-form');
            const input = document.getElementById('todo-input');
            const todoList = document.getElementById('todo-list');
            const emptyState = document.getElementById('empty-state');
            const taskCountDisplay = document.getElementById('task-count');
            const clearCompletedBtn = document.getElementById('clear-completed');
            const dateDisplay = document.getElementById('date-display');

            // --- State ---
            // Try to load tasks from local storage, default to an empty array
            let tasks = JSON.parse(localStorage.getItem('my_todos')) || [];

            // --- Initialize ---
            displayDate();
            renderTasks();

            // --- Event Listeners ---
            form.addEventListener('submit', addTask);
            clearCompletedBtn.addEventListener('click', clearCompletedTasks);
            
            // Event delegation for list items (checkboxes and delete buttons)
            todoList.addEventListener('click', handleListClick);

            // --- Functions ---

            // Display current date nicely
            function displayDate() {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const today = new Date();
                dateDisplay.textContent = today.toLocaleDateString('zh-CN', options);
            }

            // Save tasks to local storage
            function saveTasks() {
                localStorage.setItem('my_todos', JSON.stringify(tasks));
                updateUI();
            }

            // Add a new task
            function addTask(e) {
                e.preventDefault();
                const text = input.value.trim();
                
                if (text === '') return;

                const newTask = {
                    id: Date.now().toString(), // Simple unique ID
                    text: text,
                    completed: false
                };

                tasks.push(newTask);
                input.value = ''; // Clear input
                saveTasks();
            }

            // Handle clicks on the list (delegation)
            function handleListClick(e) {
                const target = e.target;
                
                // Find the closest task item container
                const listItem = target.closest('li');
                if (!listItem) return;
                
                const taskId = listItem.dataset.id;

                // Handle Checkbox click
                if (target.type === 'checkbox') {
                    toggleTaskStatus(taskId);
                } 
                // Handle Delete button click (could be the button or the icon inside it)
                else if (target.closest('.delete-btn')) {
                    deleteTask(taskId, listItem);
                }
            }

            // Toggle task completion status
            function toggleTaskStatus(id) {
                tasks = tasks.map(task => {
                    if (task.id === id) {
                        return { ...task, completed: !task.completed };
                    }
                    return task;
                });
                saveTasks();
            }

            // Delete a specific task with animation
            function deleteTask(id, listItemElement) {
                // Add animation class
                listItemElement.classList.add('removing');
                
                // Wait for animation to finish before removing from array and re-rendering
                setTimeout(() => {
                    tasks = tasks.filter(task => task.id !== id);
                    saveTasks();
                }, 300); // Matches the CSS transition duration
            }

            // Clear all completed tasks
            function clearCompletedTasks() {
                const completedTasks = tasks.filter(task => task.completed);
                if (completedTasks.length === 0) return;

                // For a simple animation effect on clear, we just re-render immediately
                tasks = tasks.filter(task => !task.completed);
                saveTasks();
            }

            // Update the UI elements (list, empty state, count)
            function updateUI() {
                renderTasks();
                
                // Update empty state visibility
                if (tasks.length === 0) {
                    emptyState.classList.remove('hidden');
                    todoList.classList.add('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    todoList.classList.remove('hidden');
                }

                // Update count text
                const activeTasks = tasks.filter(t => !t.completed).length;
                taskCountDisplay.textContent = `${activeTasks} 个未完成任务`;
            }

            // Render the HTML for the tasks
            function renderTasks() {
                todoList.innerHTML = ''; // Clear current list

                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'task-item bg-white border border-gray-100 rounded-xl p-4 shadow-sm flex items-center justify-between hover:shadow-md transition-shadow group';
                    li.dataset.id = task.id;

                    const isChecked = task.completed ? 'checked' : '';
                    const textClass = task.completed ? 'completed-text' : 'text-gray-700';

                    li.innerHTML = `
                        <div class="flex items-center gap-4 flex-1 overflow-hidden">
                            <input 
                                type="checkbox" 
                                class="custom-checkbox shrink-0" 
                                ${isChecked}
                            >
                            <span class="text-base truncate transition-colors duration-200 ${textClass}">
                                ${escapeHTML(task.text)}
                            </span>
                        </div>
                        <button 
                            class="delete-btn text-gray-300 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none ml-2 shrink-0"
                            title="删除任务"
                        >
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    todoList.appendChild(li);
                });
            }

            // Helper to prevent XSS when rendering user input
            function escapeHTML(str) {
                return str.replace(
                    /[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }
        });
    </script>
</body>
</html>
